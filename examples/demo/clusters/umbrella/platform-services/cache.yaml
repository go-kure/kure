apiVersion: generators.gokure.dev/v1alpha1
kind: AppWorkload
metadata:
  name: cache
  namespace: platform-services
spec:
  workload: Deployment
  containers:
    - name: redis
      image: redis:7-alpine
      ports:
        - name: redis
          containerPort: 6379
      resources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 256Mi
          cpu: 200m
