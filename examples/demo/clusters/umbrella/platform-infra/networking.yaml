apiVersion: generators.gokure.dev/v1alpha1
kind: AppWorkload
metadata:
  name: networking
  namespace: platform-infra
spec:
  workload: Deployment
  containers:
    - name: nginx-ingress
      image: registry.k8s.io/ingress-nginx/controller:v1.10.0
      ports:
        - name: http
          containerPort: 80
        - name: https
          containerPort: 443
      resources:
        requests:
          memory: 90Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 500m
