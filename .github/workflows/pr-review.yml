name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-review:
    uses: go-kure/.github/.github/workflows/pr-review.yml@main
    with:
      pr_review_context: "Go library for programmatically building Kubernetes resources. Uses typed builders instead of templates. Part of the Wharf platform."
    secrets: inherit
