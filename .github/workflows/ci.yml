name: CI

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]
  merge_group:  # required: checks must report on the merge queue's temporary branch
  schedule:
    - cron: '0 4 * * *'  # 4am UTC daily - catch external changes
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  GOLANGCI_LINT_VERSION: 'v2.10.1'
  GOVULNCHECK_VERSION: 'v1.1.4'
  # The runner binary patch (Runner.Worker.dll) renames all occurrences of
  # ACTIONS_RESULTS_URL to ACTIONS_RESULTS_ORL, including the name the Worker
  # injects into step process environments.  Workflow env overrides runner-injected
  # values, so setting ACTIONS_RESULTS_URL here ensures upload-artifact,
  # download-artifact, and cache (v2) all see the correct in-cluster URL.
  ACTIONS_RESULTS_URL: 'http://actions-cache-server.arc-runners.svc.cluster.local:3000/'

# Avoid duplicate runs on the same commit
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Pre-flight: Detect Changed Paths
  # =============================================================================

  changes:
    name: detect-changes
    runs-on: autops-kube-kure
    timeout-minutes: 2
    # On merge_group there is no PR base to diff against; dorny/paths-filter would
    # error. Skip the filter and force both outputs to 'true' so every gating job
    # runs in the queue — otherwise required checks never report and merges hang.
    outputs:
      go: ${{ github.event_name == 'merge_group' && 'true' || steps.filter.outputs.go }}
      docs: ${{ github.event_name == 'merge_group' && 'true' || steps.filter.outputs.docs }}

    steps:
    - uses: actions/checkout@v7
    - uses: dorny/paths-filter@v4
      if: github.event_name != 'merge_group'
      id: filter
      with:
        filters: |
          go:
            - '**.go'
            - 'go.mod'
            - 'go.sum'
            - 'Makefile'
            - '.github/workflows/**'
          docs:
            - 'site/**'
            - 'docs/**'
            - '**.md'
            - 'pkg/**'
            - 'scripts/**'
            - '.github/workflows/ci.yml'

  # =============================================================================
  # Stage 1: Fast Validation
  # =============================================================================

  validate:
    name: lint
    runs-on: autops-kube-kure
    timeout-minutes: 15
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.go == 'true')

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install build tools
      run: command -v make &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends make)

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    - name: Read Go version from go.mod
      id: go-version
      run: |
        GO_VER=$(grep '^go ' go.mod | awk '{print $2}')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VER"

    # Source-aware Go build cache (was go.sum-only → froze at an old snapshot). Warmed on
    # push-to-main, restored by PR + queue via fallback. Split restore/save + matched-key log;
    # distinct job prefix so lint and test don't overwrite each other's entry.
    - name: Restore Go build cache
      id: gocache
      uses: actions/cache/restore@v6
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-validate-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-${{ hashFiles('**/*.go', 'go.mod', 'go.sum', 'Makefile', '**/testdata/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-validate-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-validate-

    - name: Log Go build cache restore
      run: |
        echo "cache-hit=${{ steps.gocache.outputs.cache-hit }}"
        echo "primary-key=${{ steps.gocache.outputs.cache-primary-key }}"
        echo "matched-key=${{ steps.gocache.outputs.cache-matched-key }}"

    - name: Install dependencies
      run: make deps

    - name: Check Go version consistency
      run: make check-go-version

    - name: Cache yq
      id: yq-cache
      uses: actions/cache@v6
      with:
        path: ~/bin/yq
        key: yq-4.44.6-linux-amd64

    - name: Install yq
      if: steps.yq-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/bin
        curl -fsSL -o ~/bin/yq \
          https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
        chmod +x ~/bin/yq
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Add yq to PATH
      if: steps.yq-cache.outputs.cache-hit == 'true'
      run: echo "$HOME/bin" >> $GITHUB_PATH

    - name: Validate version consistency
      run: ./scripts/sync-versions.sh check

    - name: Cache goimports
      id: goimports-cache
      uses: actions/cache@v6
      with:
        path: ~/go/bin/goimports
        key: goimports-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          goimports-

    - name: Install goimports
      if: steps.goimports-cache.outputs.cache-hit != 'true'
      run: go install golang.org/x/tools/cmd/goimports@latest

    - name: Check formatting
      run: |
        make fmt
        if [ -n "$(git status --porcelain)" ]; then
          echo "::error::Code is not properly formatted. Run 'make fmt' to fix."
          git diff
          exit 1
        fi

    - name: Check go mod tidy
      run: |
        make tidy
        if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
          echo "::error::go.mod or go.sum is not tidy. Run 'make tidy' to fix."
          git diff go.mod go.sum
          exit 1
        fi

    - name: Run go vet
      run: make vet

    - name: Fetch base branch for diff-based lint
      if: github.event_name == 'pull_request'
      run: git fetch origin ${{ github.base_ref }} --depth=1

    - name: Run linters
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          make lint LINT_FLAGS="--new-from-rev=origin/${{ github.base_ref }}"
        else
          make lint
        fi

    - name: Save Go build cache
      if: success() && steps.gocache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ~/.cache/go-build
        key: ${{ steps.gocache.outputs.cache-primary-key }}

  # =============================================================================
  # Stage 2: Tests and Security (parallel with lint)
  # =============================================================================

  test:
    name: test
    runs-on: autops-kube-kure
    timeout-minutes: 20
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.go == 'true')

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install build tools
      run: command -v gcc &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends build-essential)

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    - name: Read Go version from go.mod
      id: go-version
      run: |
        GO_VER=$(grep '^go ' go.mod | awk '{print $2}')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VER"

    # Source-aware Go build cache (see the validate job for rationale). Distinct prefix.
    - name: Restore Go build cache
      id: gocache
      uses: actions/cache/restore@v6
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-test-race-cover-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-${{ hashFiles('**/*.go', 'go.mod', 'go.sum', 'Makefile', '**/testdata/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-test-race-cover-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-test-race-cover-

    - name: Log Go build cache restore
      run: |
        echo "cache-hit=${{ steps.gocache.outputs.cache-hit }}"
        echo "primary-key=${{ steps.gocache.outputs.cache-primary-key }}"
        echo "matched-key=${{ steps.gocache.outputs.cache-matched-key }}"

    - name: Install dependencies
      run: make deps

    - name: Run tests
      run: |
        set -euo pipefail
        mkdir -p coverage
        go test -v -race -coverprofile=coverage/coverage.out -covermode=atomic -timeout 15m ./... 2>&1 | tee /tmp/gotest.log

    - name: Save Go build cache
      if: success() && steps.gocache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ~/.cache/go-build
        key: ${{ steps.gocache.outputs.cache-primary-key }}

    - name: Upload test log
      uses: actions/upload-artifact@v7
      if: always()
      continue-on-error: true
      with:
        name: test-log
        path: /tmp/gotest.log
        if-no-files-found: warn

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v7
      continue-on-error: true
      with:
        name: coverage
        path: coverage/coverage.out
        retention-days: 7

  security:
    name: Security
    runs-on: autops-kube-kure
    timeout-minutes: 5
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.go == 'true')

    # GOMEMLIMIT keeps Go's GC under the runner pod memory limit so govulncheck (peaks ~3.8Gi
    # on large module graphs) doesn't get OOMKilled. Pairs with the 6Gi ARC runner limit.
    env:
      GOMEMLIMIT: 5GiB

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install build tools
      run: command -v make &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends make)

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    - name: Cache govulncheck binary
      id: govulncheck-cache
      uses: actions/cache@v6
      with:
        path: ~/go/bin/govulncheck
        key: govulncheck-${{ env.GOVULNCHECK_VERSION }}

    - name: Read Go version from go.mod
      id: go-version
      run: |
        GO_VER=$(grep '^go ' go.mod | awk '{print $2}')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VER"

    # Source-aware Go build cache. govulncheck's scan compiles the module, so a warm cache
    # helps here too (this job had no build cache before). Distinct prefix.
    - name: Restore Go build cache
      id: gocache
      uses: actions/cache/restore@v6
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-security-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-${{ hashFiles('**/*.go', 'go.mod', 'go.sum', 'Makefile', '**/testdata/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-security-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-security-

    - name: Log Go build cache restore
      run: |
        echo "cache-hit=${{ steps.gocache.outputs.cache-hit }}"
        echo "primary-key=${{ steps.gocache.outputs.cache-primary-key }}"
        echo "matched-key=${{ steps.gocache.outputs.cache-matched-key }}"

    - name: Install govulncheck
      if: steps.govulncheck-cache.outputs.cache-hit != 'true'
      run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

    - name: Run govulncheck
      run: |
        set +e
        OUTPUT=$(~/go/bin/govulncheck -scan package ./... 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"

        if [ $EXIT_CODE -eq 3 ]; then
          # Exit code 3 = vulnerabilities found; report but do not block CI.
          # Track and fix via dedicated dependency-update issues.
          echo "::warning::govulncheck found vulnerabilities — see step summary"
          {
            echo "## :shield: govulncheck found vulnerabilities"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ""
            echo "**Action:** Open a dependency-update issue and fix before next release."
          } >> "$GITHUB_STEP_SUMMARY"
        elif [ $EXIT_CODE -ne 0 ]; then
          # Exit code 1/2 = tool error; fail the job.
          echo "::error::govulncheck failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        else
          echo ":white_check_mark: **govulncheck** — no vulnerabilities found" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Save Go build cache
      if: success() && steps.gocache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ~/.cache/go-build
        key: ${{ steps.gocache.outputs.cache-primary-key }}

    - name: Check for outdated dependencies
      run: make outdated

    - name: Check for sensitive files
      run: |
        # Check for common sensitive patterns
        if grep -r -i "password\|secret\|token\|key" --include="*.go" --include="*.yaml" --include="*.yml" . | grep -v "test" | grep -v "_test.go" | grep -E "(=|:)" | head -10; then
          echo "::warning::Potential sensitive information found in code. Please review."
        fi

  # =============================================================================
  # Stage 3: Coverage Check
  # =============================================================================

  coverage-check:
    name: Coverage Check
    runs-on: autops-kube-kure
    timeout-minutes: 5
    needs: test
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    - name: Download coverage artifact
      id: download-coverage
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: coverage
        path: coverage/

    - name: Check coverage threshold
      id: coverage
      run: |
        if [ ! -f coverage/coverage.out ]; then
          echo "::warning::Coverage artifact not available (artifact upload may have failed on runner)"
          echo "coverage=0" >> $GITHUB_OUTPUT
          exit 0
        fi
        COVERAGE=$(go tool cover -func=coverage/coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
        THRESHOLD=90
        PKG_THRESHOLD=90
        echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "Current coverage: ${COVERAGE}%"
        echo "Required threshold: ${THRESHOLD}%"

        if [ "${COVERAGE%.*}" -lt "$THRESHOLD" ]; then
          echo "::error::Test coverage ${COVERAGE}% is below required threshold of ${THRESHOLD}%"
          exit 1
        else
          echo "::notice::Test coverage ${COVERAGE}% meets required threshold"
        fi

        # Per-package coverage check — fail if any non-examples package is below PKG_THRESHOLD
        echo ""
        echo "Checking per-package coverage (threshold: ${PKG_THRESHOLD}%)..."
        awk '
        NR == 1 { next }
        {
          split($1, a, ":")
          file = a[1]
          n = split(file, parts, "/")
          pkg = ""
          for (i = 1; i < n; i++) {
            if (i > 1) pkg = pkg "/"
            pkg = pkg parts[i]
          }
          total_stmts[pkg] += $2
          if ($3 > 0) covered_stmts[pkg] += $2
        }
        END {
          for (pkg in total_stmts) {
            if (total_stmts[pkg] > 0) {
              pct = int(covered_stmts[pkg] / total_stmts[pkg] * 100)
              print pkg " " pct
            }
          }
        }
        ' coverage/coverage.out | sort > /tmp/pkg_coverage.txt

        FAILED=0
        while read pkg pct; do
          case "$pkg" in
            */examples/*) continue ;;
          esac
          if [ "$pct" -lt "$PKG_THRESHOLD" ]; then
            echo "::error::Package ${pkg} coverage ${pct}% is below per-package threshold of ${PKG_THRESHOLD}%"
            FAILED=1
          else
            echo "  ${pkg}: ${pct}%"
          fi
        done < /tmp/pkg_coverage.txt

        if [ "$FAILED" -eq 1 ]; then
          echo "::error::One or more packages are below the per-package coverage threshold of ${PKG_THRESHOLD}%"
          exit 1
        fi
        echo "All packages meet the per-package coverage threshold."

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./coverage/coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        header: coverage
        message: |
          ## Test Coverage Report

          **Total Coverage:** ${{ steps.coverage.outputs.coverage }}%

          Coverage threshold: 90%

  # =============================================================================
  # Stage 4: Build Gate (parallel with coverage-check)
  # =============================================================================

  build:
    name: build
    runs-on: autops-kube-kure
    timeout-minutes: 1
    needs: [validate, test, docs-build, coverage-check, doc-gate]
    if: always()
    steps:
    - name: Check build results
      run: |
        vl="${{ needs.validate.result }}"
        tt="${{ needs.test.result }}"
        db="${{ needs.docs-build.result }}"
        cc="${{ needs.coverage-check.result }}"
        dg="${{ needs.doc-gate.result }}"
        for result in "$vl" "$tt" "$db" "$cc" "$dg"; do
          if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
            echo "Required job failed or was cancelled (result: $result)"
            exit 1
          fi
        done

  # =============================================================================
  # Docs Build (parallel with main pipeline)
  # =============================================================================

  docs-build:
    name: docs-build
    runs-on: autops-kube-kure
    timeout-minutes: 15
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.docs == 'true')

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install build tools
      run: command -v make &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends make)

    - name: Read Hugo version from mise.toml
      id: hugo-version
      run: |
        HUGO_VER=$(grep '^hugo = ' mise.toml | sed 's/hugo = "\(.*\)"/\1/')
        if [ -z "$HUGO_VER" ]; then
          echo "::error::Failed to parse Hugo version from mise.toml"
          exit 1
        fi
        echo "version=$HUGO_VER" >> $GITHUB_OUTPUT

    - name: Restore Hugo from cache
      id: hugo-cache
      uses: actions/cache@v6
      with:
        path: ${{ runner.temp }}/hugo-bin
        key: hugo-${{ steps.hugo-version.outputs.version }}-linux-amd64

    - name: Install Hugo CLI
      if: steps.hugo-cache.outputs.cache-hit != 'true'
      run: |
        HUGO_VER="${{ steps.hugo-version.outputs.version }}"
        curl -fsSL -o ${{ runner.temp }}/hugo.deb \
          "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VER}/hugo_extended_${HUGO_VER}_linux-amd64.deb"
        sudo dpkg -i ${{ runner.temp }}/hugo.deb
        mkdir -p ${{ runner.temp }}/hugo-bin
        cp /usr/local/bin/hugo ${{ runner.temp }}/hugo-bin/hugo

    - name: Add cached Hugo to PATH
      if: steps.hugo-cache.outputs.cache-hit == 'true'
      run: sudo install ${{ runner.temp }}/hugo-bin/hugo /usr/local/bin/hugo

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    - name: Cache Hugo modules
      uses: actions/cache@v6
      with:
        path: ${{ runner.temp }}/hugo_cache
        key: ${{ runner.os }}-hugo-${{ hashFiles('site/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-hugo-

    - name: Cache yq
      id: yq-cache
      uses: actions/cache@v6
      with:
        path: ~/bin/yq
        key: yq-4.44.6-linux-amd64

    - name: Install yq
      if: steps.yq-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/bin
        curl -fsSL -o ~/bin/yq \
          https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
        chmod +x ~/bin/yq
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Add yq to PATH
      if: steps.yq-cache.outputs.cache-hit == 'true'
      run: echo "$HOME/bin" >> $GITHUB_PATH

    - name: Validate docs map (code↔docs sync)
      run: bash site/scripts/check-doc-sync.sh

    - name: Inject front matter
      run: bash site/scripts/inject-frontmatter.sh

    - name: Generate versions config overlay
      run: bash scripts/gen-versions-toml.sh --version dev

    - name: Build Hugo site
      working-directory: site
      env:
        HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        HUGO_ENVIRONMENT: production
      run: hugo --config hugo.toml,versions.toml --minify --baseURL "https://www.gokure.dev/kure/"

    - name: Upload docs artifact
      uses: actions/upload-artifact@v7
      with:
        name: docs-site
        path: site/public/
        retention-days: 7

    - name: Cache lychee
      id: lychee-cache
      uses: actions/cache@v6
      with:
        path: ~/bin/lychee
        key: lychee-0.24.2-linux-amd64

    - name: Install lychee
      if: steps.lychee-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/bin
        curl -fsSL -o /tmp/lychee.tar.gz \
          https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-x86_64-unknown-linux-gnu.tar.gz
        tar xzf /tmp/lychee.tar.gz -C /tmp
        install -m755 /tmp/lychee-x86_64-unknown-linux-gnu/lychee ~/bin/lychee
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Add lychee to PATH
      if: steps.lychee-cache.outputs.cache-hit == 'true'
      run: echo "$HOME/bin" >> $GITHUB_PATH

    - name: Check internal links (rendered site)
      run: bash site/scripts/check-links.sh

  # =============================================================================
  # PR-only Jobs (parallel, non-blocking)
  # =============================================================================

  analyze-changes:
    name: Analyze Changes
    runs-on: autops-kube-kure
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v47
      with:
        files: |
          **.go
          go.mod
          go.sum
          Makefile
          .github/workflows/**.yml

    - name: Analyze Go changes
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        echo "Changed Go-related files:"
        echo "${{ steps.changed-files.outputs.all_changed_files }}"

        # Count lines of code changes
        ADDED_LINES=$(git diff --numstat origin/main...HEAD | awk '{added+=$1} END {print added+0}')
        REMOVED_LINES=$(git diff --numstat origin/main...HEAD | awk '{removed+=$2} END {print removed+0}')

        echo "Lines added: $ADDED_LINES"
        echo "Lines removed: $REMOVED_LINES"

        # Check if this is a major change
        if [ "$ADDED_LINES" -gt 500 ] || [ "$REMOVED_LINES" -gt 500 ]; then
          echo "::notice::This is a major change (500+ lines). Consider breaking it into smaller PRs."
        fi

    - name: Check for breaking changes
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        # Look for potential breaking changes in public APIs
        if echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -E "pkg/.*\.go$"; then
          echo "::warning::Changes detected in pkg/ directory. Review for potential breaking changes to public API."
        fi

  # Layer 3 change-gate: a mapped package's source change must touch its mapped
  # docs in the same PR. Always runs on PRs (so a pkg-only change can't skip it);
  # the maintainer-restricted `docs-skip` label bypasses via the script. On
  # merge_group this is skipped (the PR already passed it), which the build gate
  # accepts. Required via the `build` aggregate job.
  doc-gate:
    name: doc-gate
    runs-on: autops-kube-kure
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Cache yq
      id: yq-cache
      uses: actions/cache@v6
      with:
        path: ~/bin/yq
        key: yq-4.44.6-linux-amd64

    - name: Install yq
      if: steps.yq-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/bin
        curl -fsSL -o ~/bin/yq \
          https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
        chmod +x ~/bin/yq
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Add yq to PATH
      if: steps.yq-cache.outputs.cache-hit == 'true'
      run: echo "$HOME/bin" >> $GITHUB_PATH

    - name: Enforce docs-with-code (Layer 3)
      run: |
        bash site/scripts/check-doc-gate.sh "origin/${{ github.base_ref }}" . \
          "--skip=${{ contains(github.event.pull_request.labels.*.name, 'docs-skip') }}"

  # =============================================================================
  # Stage 5: Mirror to GitLab (main only, after all checks pass)
  # =============================================================================

  mirror-to-gitlab:
    name: Mirror to GitLab
    runs-on: autops-kube-kure
    timeout-minutes: 5
    needs: [build, security, docs-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Push to GitLab mirror
      env:
        GITLAB_DEPLOY_KEY: ${{ secrets.GITLAB_DEPLOY_KEY }}
      run: |
        set -euo pipefail

        # SSH setup
        mkdir -p ~/.ssh
        echo "$GITLAB_DEPLOY_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -t ed25519 gitlab.com >> ~/.ssh/known_hosts 2>/dev/null

        # Add GitLab remote
        git remote add gitlab git@gitlab.com:autops/wharf/kure.git

        # Divergence detection
        echo "Fetching GitLab main branch for comparison..."
        if git fetch gitlab main 2>/dev/null; then
          GITLAB_SHA=$(git rev-parse FETCH_HEAD)
          GITHUB_SHA=$(git rev-parse HEAD)

          if [ "$GITLAB_SHA" = "$GITHUB_SHA" ]; then
            echo "GitLab main is already up to date (${GITHUB_SHA:0:7})"
          elif git merge-base --is-ancestor FETCH_HEAD HEAD; then
            echo "GitLab main is behind GitHub main (fast-forward)"
            echo "  GitLab: ${GITLAB_SHA:0:7}"
            echo "  GitHub: ${GITHUB_SHA:0:7}"
          else
            echo "::error::GitLab main has diverged from GitHub main — manual intervention required"
            echo "  GitHub main: ${GITHUB_SHA:0:7}"
            echo "  GitLab main: ${GITLAB_SHA:0:7}"
            MERGE_BASE=$(git merge-base FETCH_HEAD HEAD 2>/dev/null || echo "none")
            echo "  Common ancestor: ${MERGE_BASE:0:7}"
            exit 1
          fi
        else
          echo "Could not fetch GitLab main (first push or empty repository)"
        fi

        # Push main branch
        echo "Pushing main branch to GitLab..."
        git push gitlab HEAD:main

        # Push tags (force to ensure GitHub is source of truth)
        echo "Pushing tags to GitLab..."
        git push --force gitlab 'refs/tags/*:refs/tags/*'

        echo "Mirror sync complete"
