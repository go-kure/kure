# versions.yaml - Single source of truth for supported versions
#
# Two key fields per dependency:
#   current:         EXACT version go.mod must import (validated)
#   supported_range: Versions the generated YAML works with (documented)

# Go version (mise.toml is authoritative for tooling)
go:
  current: "1.26.3"
  # mise.toml is the source of truth for Go version

# Infrastructure dependencies
infrastructure:
  cert-manager:
    # go.mod MUST have: github.com/cert-manager/cert-manager v1.20.2
    current: "1.20.2"
    go_module: "github.com/cert-manager/cert-manager"
    # Kure generates YAML compatible with these deployed versions
    supported_range: "1.14 - 1.20"
    max_dependabot: null  # No restriction needed
    notes: "Stable v1 APIs. v1.20 deprecated ObjectReference in favor of IssuerReference (type alias)."

  fluxcd:
    current: "2.8.7"
    go_module: "github.com/fluxcd/flux2/v2"
    supported_range: "2.4 - 2.8"
    max_dependabot: null
    notes: |
      v1beta2 APIs removed in 2.8, DependsOn uses DependencyReference.
      image-automation-controller promoted to v1.
      v2.8.7 fixes CVE-2026-45022 (go-git v5.19.0) in source-controller
      and image-automation-controller; fixes non-namespaced resource
      ssa:IfNotPresent delete/recreate loop in kustomize-controller.
      All github.com/fluxcd/* packages upgraded together.
    related_packages:
      - "github.com/fluxcd/*"
      - "github.com/controlplaneio-fluxcd/*"

  flux-operator:
    current: "0.48.0"
    go_module: "github.com/controlplaneio-fluxcd/flux-operator"
    supported_range: "0.23 - 0.48"
    max_dependabot: null
    notes: "Upgraded alongside FluxCD 2.8.7 ecosystem."

  source-watcher:
    current: "2.1.1"
    go_module: "github.com/fluxcd/source-watcher/api/v2"
    supported_range: "2.0 - 2.1"
    max_dependabot: null
    notes: |
      Optional FluxCD controller for source composition/decomposition.
      Manages ArtifactGenerator CRD (source.extensions.fluxcd.io/v1beta1).
      Not in default Flux installation; requires --components-extra=source-watcher.
    related_packages:
      - "github.com/fluxcd/source-controller"

  metallb:
    current: "0.15.3"
    go_module: "go.universe.tf/metallb"
    supported_range: "0.14 - 0.15"
    max_dependabot: null  # No restriction needed
    notes: "Stable v1beta1 APIs, patch release"

  prometheus-operator:
    current: "0.91.0"
    go_module: "github.com/prometheus-operator/prometheus-operator/pkg/apis/monitoring"
    supported_range: "0.75 - 0.91"
    max_dependabot: null
    notes: |
      Prometheus operator monitoring API types (ServiceMonitor, PodMonitor, PrometheusRule).
      Only the /pkg/apis/monitoring submodule is imported — not the full operator.
      Stable v1 APIs (monitoring.coreos.com/v1).

  external-secrets:
    current: "0.0.0-20260213133823-31b0c7c37342"
    go_module: "github.com/external-secrets/external-secrets/apis"
    supported_range: "1.3"
    max_dependabot: null
    notes: |
      Module path changed from root to /apis submodule in v1.0 (#5494).
      No semver tags for apis submodule — use pseudo-versions pinned to release commits.
      v1.3.2+ commit: 31b0c7c3734255a92dfe5cf9e1e204de127eb24c (includes controller-runtime v0.23.1 compat)

  cnpg:
    current: "1.29.1"
    go_module: "github.com/cloudnative-pg/cloudnative-pg"
    supported_range: "1.24 - 1.29"
    max_dependabot: null
    notes: |
      CloudNativePG operator for PostgreSQL on Kubernetes.
      Cluster CR (with managed roles), Database CR (postgresql.cnpg.io/v1),
      ObjectStore CR (barmancloud.cnpg.io/v1), and ScheduledBackups.
      ObjectStore lives in a separate module (plugin-barman-cloud).
    related_packages:
      - "github.com/cloudnative-pg/plugin-barman-cloud"
      - "github.com/cloudnative-pg/barman-cloud"
      - "github.com/cloudnative-pg/machinery"

  cnpg-barman-cloud:
    current: "0.12.0"
    go_module: "github.com/cloudnative-pg/plugin-barman-cloud"
    supported_range: "0.9 - 0.12"
    max_dependabot: null
    notes: |
      Barman Cloud plugin for CNPG — provides ObjectStore CR (barmancloud.cnpg.io/v1).
      Versioned independently from the CNPG operator.

  controller-runtime:
    current: "0.24.0"
    go_module: "sigs.k8s.io/controller-runtime"
    supported_range: "0.22 - 0.24"
    max_dependabot: null
    notes: "v0.24.0 requires k8s.io/* v0.36.0 (Kubernetes 1.36)"
    related_packages:
      - "sigs.k8s.io/kustomize/api"
      - "sigs.k8s.io/yaml"

  gateway-api:
    current: "1.5.1"
    go_module: "sigs.k8s.io/gateway-api"
    supported_range: "1.0 - 1.5"
    max_dependabot: null
    notes: |
      Gateway API v1 types (HTTPRoute). Used by pkg/kubernetes HTTPRoute builders.
      Kure generates gateway.networking.k8s.io/v1 resources (GA since v1.0).

  kubernetes:
    current: "0.36.0"
    go_module: "k8s.io/api"
    # What K8s cluster versions kure-generated YAML works with
    supported_range: "1.33 - 1.36"
    notes: "Go 1.26 baseline; generated YAML uses stable APIs compatible across this range"
    related_packages:
      - "k8s.io/apimachinery"
      - "k8s.io/apiextensions-apiserver"
      - "k8s.io/client-go"
      - "k8s.io/cli-runtime"
