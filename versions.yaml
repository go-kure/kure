# versions.yaml - Single source of truth for supported versions
#
# Two key fields per dependency:
#   current:         EXACT version go.mod must import (validated)
#   supported_range: Versions the generated YAML works with (documented)

# Go version (mise.toml is authoritative for tooling)
go:
  current: "1.26.0"
  # mise.toml is the source of truth for Go version

# Infrastructure dependencies
infrastructure:
  cert-manager:
    # go.mod MUST have: github.com/cert-manager/cert-manager v1.19.4
    current: "1.19.4"
    go_module: "github.com/cert-manager/cert-manager"
    # Kure generates YAML compatible with these deployed versions
    supported_range: "1.14 - 1.19"
    max_dependabot: null  # No restriction needed
    notes: "Stable v1 APIs, backward compatible"

  fluxcd:
    current: "2.6.4"
    go_module: "github.com/fluxcd/flux2/v2"
    supported_range: "2.4 - 2.6"
    max_dependabot: "< 2.7"
    notes: |
      2.7+ requires Go 1.25, tracked in #128
      image-automation-controller 1.0+ requires Go 1.25 (#171)
      All github.com/fluxcd/* packages blocked from minor/major updates
    # Additional packages in this ecosystem (same version constraint)
    related_packages:
      - "github.com/fluxcd/*"
      - "github.com/controlplaneio-fluxcd/*"

  flux-operator:
    current: "0.24.1"
    go_module: "github.com/controlplaneio-fluxcd/flux-operator"
    supported_range: "0.23 - 0.24"
    max_dependabot: "< 0.25"
    notes: "0.25+ requires Go 1.25"

  metallb:
    current: "0.15.3"
    go_module: "go.universe.tf/metallb"
    supported_range: "0.14 - 0.15"
    max_dependabot: null  # No restriction needed
    notes: "Stable v1beta1 APIs, patch release"

  external-secrets:
    current: "0.0.0-20260203074332-a2ec42276c5e"
    go_module: "github.com/external-secrets/external-secrets/apis"
    supported_range: "1.3"
    max_dependabot: null
    notes: |
      Module path changed from root to /apis submodule in v1.0 (#5494).
      No semver tags for apis submodule — use pseudo-versions pinned to release commits.
      v1.3.2 commit: a2ec42276c5ec6ed46232648f2397823b9b84aaf

  controller-runtime:
    current: "0.22.5"
    go_module: "sigs.k8s.io/controller-runtime"
    supported_range: "0.22 - 0.23"
    max_dependabot: null
    notes: "external-secrets module path migration (#248) removed the upgrade blocker"

  kubernetes:
    current: "0.35.1"
    go_module: "k8s.io/api"
    # What K8s cluster versions kure-generated YAML works with
    supported_range: "1.28 - 1.35"
    notes: "Generated YAML uses stable APIs compatible across this range"
    related_packages:
      - "k8s.io/apimachinery"
      - "k8s.io/apiextensions-apiserver"
      - "k8s.io/client-go"
      - "k8s.io/cli-runtime"
