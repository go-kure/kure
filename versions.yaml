# versions.yaml - Single source of truth for supported version metadata
#
# The exact build version of each dependency lives ONLY in go.mod (the pin).
# This file holds the human-judgment metadata that no tool can derive:
#
#   supported_range: Versions the generated YAML works with (documented + guarded)
#   max_dependabot:  Optional cap mirrored into .github/dependabot.yml ignore rules
#   notes / related_packages: context for reviewers
#
# scripts/sync-versions.sh reads the build version from go.mod and asserts its
# major.minor falls within supported_range. There is no "current" field to keep
# in sync — that removes the recurring Dependabot lint failure (issue #593).
#
# version_basis (optional, default "semver"):
#   Set to "kubernetes" when the go module is versioned v0.N.x but supported_range
#   is expressed in cluster terms (1.N). The guard then normalizes v0.N -> 1.N
#   before comparing. Only k8s.io/api needs this today.

# Go version (mise.toml is authoritative for tooling)
go:
  current: "1.26.5"
  # mise.toml is the source of truth for Go version

# Infrastructure dependencies
infrastructure:
  cert-manager:
    go_module: "github.com/cert-manager/cert-manager"
    # Kure generates YAML compatible with these deployed versions
    supported_range: "1.14 - 1.21"
    max_dependabot: null  # No restriction needed
    notes: |
      Stable v1 APIs. v1.20 deprecated ObjectReference in favor of IssuerReference (type alias).
      v1.21 removed the deprecated ObjectReference type (#8625); kure already uses
      IssuerReference (plus LocalObjectReference/SecretKeySelector from meta/v1), so the
      imported certmanager/v1 + acme/v1 + meta/v1 surface is unaffected — build + tests pass.

  fluxcd:
    go_module: "github.com/fluxcd/flux2/v2"
    supported_range: "2.4 - 2.9"
    max_dependabot: null
    notes: |
      v1beta2 APIs removed in 2.8, DependsOn uses DependencyReference.
      image-automation-controller promoted to v1.
      v2.9 (source-controller/api v1.9): OCIRepositoryVerification and
      HelmChartVerification split into distinct types (HelmChart.Spec.Verify is now
      *HelmChartVerification); OCIRepositoryVerification gained TrustedRootSecretRef.
      notification-controller/api v1.9: Receiver.Spec.Resources is now []ReceiverResource
      (embeds CrossNamespaceObjectReference + CEL Filter) and Receiver.Spec.SecretRef is a
      pointer. Provider/Alert remain v1beta3 upstream (tracked by #250/#252).
      All github.com/fluxcd/* packages upgraded together.
    related_packages:
      - "github.com/fluxcd/*"
      - "github.com/controlplaneio-fluxcd/*"

  flux-operator:
    go_module: "github.com/controlplaneio-fluxcd/flux-operator"
    supported_range: "0.23 - 0.53"
    max_dependabot: null
    notes: |
      Upgraded alongside the FluxCD 2.9 ecosystem. The vendored install bundle
      (pkg/stack/fluxcd/flux_operator_install.yaml) and FluxOperatorVersion constant
      are pinned in lockstep with this module version.

  source-watcher:
    go_module: "github.com/fluxcd/source-watcher/api/v2"
    supported_range: "2.0 - 2.2"
    max_dependabot: null
    notes: |
      Optional FluxCD controller for source composition/decomposition.
      Manages ArtifactGenerator CRD (source.extensions.fluxcd.io/v1beta1).
      Not in default Flux installation; requires --components-extra=source-watcher.
    related_packages:
      - "github.com/fluxcd/source-controller"

  metallb:
    go_module: "go.universe.tf/metallb"
    supported_range: "0.14 - 0.16"
    max_dependabot: null  # No restriction needed
    notes: |
      v1beta1 APIs stable across this range. v0.16.0 is a minor release:
      BGP config-parsing refactor (selectedNodes/selectedPools rewrite),
      node-specific ConfigurationState validation, security fixes via
      govulncheck. No changes to the v1beta1 API types that kure imports
      (IPAddressPool, BGPPeer, BGPAdvertisement, L2Advertisement, BFDProfile).

  prometheus-operator:
    go_module: "github.com/prometheus-operator/prometheus-operator/pkg/apis/monitoring"
    supported_range: "0.75 - 0.92"
    max_dependabot: null
    notes: |
      Prometheus operator monitoring API types (ServiceMonitor, PodMonitor, PrometheusRule).
      Only the /pkg/apis/monitoring submodule is imported — not the full operator.
      Stable v1 APIs (monitoring.coreos.com/v1). v0.92 is a routine minor with no changes
      to the imported v1 types (build + tests pass unchanged).

  external-secrets:
    go_module: "github.com/external-secrets/external-secrets/apis"
    supported_range: "1.3"
    max_dependabot: null
    notes: |
      Module path changed from root to /apis submodule in v1.0 (#5494).
      No semver tags for apis submodule — go.mod pins a pseudo-version to a release
      commit, so the range guard skips it (pseudo-versions can't map to semver).
      v1.3.2+ commit: 31b0c7c3734255a92dfe5cf9e1e204de127eb24c (includes controller-runtime v0.23.1 compat)

  cnpg:
    go_module: "github.com/cloudnative-pg/cloudnative-pg"
    supported_range: "1.24 - 1.30"
    max_dependabot: null
    notes: |
      CloudNativePG operator for PostgreSQL on Kubernetes.
      Cluster CR (with managed roles), Database CR (postgresql.cnpg.io/v1),
      ObjectStore CR (barmancloud.cnpg.io/v1), and ScheduledBackups.
      ObjectStore lives in a separate module (plugin-barman-cloud).
      v1.30 is a routine minor with no changes to the imported postgresql.cnpg.io/v1
      types (Cluster, Database, Pooler, ScheduledBackup) — build + tests pass unchanged.
    related_packages:
      - "github.com/cloudnative-pg/plugin-barman-cloud"
      - "github.com/cloudnative-pg/barman-cloud"
      - "github.com/cloudnative-pg/machinery"

  cnpg-barman-cloud:
    go_module: "github.com/cloudnative-pg/plugin-barman-cloud"
    supported_range: "0.9 - 0.13"
    max_dependabot: null
    notes: |
      Barman Cloud plugin for CNPG — provides ObjectStore CR (barmancloud.cnpg.io/v1).
      Versioned independently from the CNPG operator.
      v0.13 is a routine minor with no changes to the imported ObjectStore v1 type
      (build + tests pass unchanged).

  controller-runtime:
    go_module: "sigs.k8s.io/controller-runtime"
    supported_range: "0.22 - 0.24"
    max_dependabot: null
    notes: "v0.24.1 fixes Apply typed error handling regression; requires k8s.io/* v0.36.0 (Kubernetes 1.36)"
    related_packages:
      - "sigs.k8s.io/kustomize/api"
      - "sigs.k8s.io/yaml"

  gateway-api:
    go_module: "sigs.k8s.io/gateway-api"
    supported_range: "1.0 - 1.6"
    max_dependabot: null
    notes: |
      Gateway API v1 types (HTTPRoute). Used by pkg/kubernetes HTTPRoute builders.
      Kure generates gateway.networking.k8s.io/v1 resources (GA since v1.0).
      v1.6 is a routine minor with no changes to the imported
      gateway.networking.k8s.io/v1 HTTPRoute type — build + tests pass unchanged.

  kubernetes:
    go_module: "k8s.io/api"
    # k8s.io/* modules are versioned v0.N.x; the range below is in cluster terms (1.N).
    version_basis: kubernetes
    # What K8s cluster versions kure-generated YAML works with
    supported_range: "1.33 - 1.36"
    notes: "Go 1.26 baseline; generated YAML uses stable APIs compatible across this range"
    related_packages:
      - "k8s.io/apimachinery"
      - "k8s.io/apiextensions-apiserver"
      - "k8s.io/client-go"
      - "k8s.io/cli-runtime"
