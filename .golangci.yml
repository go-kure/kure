# golangci-lint configuration for Kure
# Aligned with Wharf standard (meta/standards/golangci-lint.md)

version: "2"

run:
  modules-download-mode: readonly

linters:
  enable:
    # Additional linters (default linters are enabled automatically in v2)
    - bodyclose
    - durationcheck
    - errorlint
    - exhaustive
    - misspell
    - nilerr
    - unconvert
    - whitespace
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    exhaustive:
      default-signifies-exhaustive: true
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"
  exclusions:
    generated: lax
    rules:
      # Test files have relaxed rules
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/go-kure/kure
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
