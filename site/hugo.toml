baseURL = 'https://www.gokure.dev/kure/'
languageCode = 'en-us'
title = 'Go Kure'

[params]
  disableInlineCopyToClipBoard = true
  customHeaderPartial = "custom-header.html"
  themeVariant = "relearn-dark"
  # Version is overridden at build time via versions.toml config overlay.
  # Default to "dev" so local builds and CI validation show the WIP banner.
  version = "dev"

[module]
  [[module.imports]]
    path = 'github.com/McShelby/hugo-theme-relearn'

  # === Generated content (from inject-frontmatter.sh, driven by docs-map.yaml) ===
  # Mounted wholesale: every file inject-frontmatter.sh writes into .generated/
  # is published. The set of files is controlled entirely by docs-map.yaml, so
  # there is no per-file mount list to keep in sync here.
  [[module.mounts]]
    source = ".generated"
    target = "content"

  # === Hand-authored content ===
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
